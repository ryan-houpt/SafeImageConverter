<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=280">
  <title>Safe Image Converter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <img src="icons/icon48.png" alt="" class="header-icon" width="16" height="16">
    <span class="header-title" id="header-title"></span>
  </header>

  <!-- Format Selector -->
  <section class="section">
    <label class="section-label" id="format-label"></label>
    <div class="format-group" role="group" id="format-group">
      <button class="format-btn" data-format="png" aria-pressed="false">PNG</button>
      <button class="format-btn" data-format="jpg" aria-pressed="false">JPG</button>
      <button class="format-btn" data-format="webp" aria-pressed="false">WebP</button>
    </div>
  </section>

  <!-- Output Quality -->
  <section class="section">
    <div class="quality-header">
      <label class="section-label" for="quality-slider" id="quality-label"></label>
      <span class="quality-value" id="quality-value">85%</span>
    </div>
    <input
      type="range"
      id="quality-slider"
      class="quality-slider"
      min="1"
      max="100"
      value="85"
    >
  </section>

  <!-- Conversion Counter -->
  <section class="counter-section" id="counter-section">
    <span class="counter-check">&#10003;</span>
    <span class="counter-text" id="counter-text"></span>
  </section>

  <!-- Trust Badge -->
  <section class="trust-section">
    <span class="trust-lock">&#128274;</span>
    <span class="trust-text" id="trust-text"></span>
  </section>

  <!-- Rate Prompt (hidden by default) -->
  <section class="rate-section" id="rate-section" hidden>
    <span class="rate-text" id="rate-text"></span>
    <a class="rate-link" id="rate-link" href="#"></a>
    <button class="rate-dismiss" id="rate-dismiss">&times;</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
